<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ansigrivt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* --- Theme --- */
    body {
      --bg: #0a0a0a;
      --fg: #b8b8b8;
      --ui: #888;
      --ui-dim: #444;
      --ui-border: #333;
      --ui-bg: #1a1a1a;
      --ui-hover: #ddd;
      --overlay-bg: rgba(10, 10, 10, 0.92);
      --accent: #5fd7ff;
      font-family: 'Courier New', monospace;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    body[data-theme="light"] {
      --bg: #ffffff;
      --fg: #222222;
      --ui: #666;
      --ui-dim: #aaa;
      --ui-border: #ccc;
      --ui-bg: #f0f0f0;
      --ui-hover: #111;
      --overlay-bg: rgba(255, 255, 255, 0.92);
      --accent: #0077aa;
    }

    /* --- Art scroll container --- */
    #art-scroll {
      position: fixed;
      inset: 0;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--ui-border) transparent;
    }
    #art-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    #art-scroll::-webkit-scrollbar-thumb { background: var(--ui-border); border-radius: 3px; }
    #art-scroll::-webkit-scrollbar-corner { background: transparent; }

    /* Inner wrapper: min-height 100% keeps flex centering for short art,
       grows naturally for tall art so the outer container can scroll */
    #art-scroll-inner {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px 20px 20px;
      box-sizing: border-box;
    }
    body.panel-open #art-scroll-inner { padding-left: 280px; }
    body.panel-open #bar { left: 260px; }

    /* --- Art container --- */
    #art {
      white-space: pre;
      font-size: 16px;
      line-height: 1;
      letter-spacing: 0;
      --char-w: 9px;
      --char-h: 16px;
    }
    body.fx-mode #art { user-select: none; cursor: crosshair; }
    body.fx-mode #art * { user-select: none; }
    #art .row { display: block; height: var(--char-h); }
    #art .ch {
      display: inline-block;
      width: var(--char-w);
      text-align: center;
    }

    /* --- ANSI colors --- */
    .af0{color:#000}.af1{color:#a00}.af2{color:#0a0}.af3{color:#a50}.af4{color:#00a}.af5{color:#a0a}.af6{color:#0aa}.af7{color:#aaa}
    .af8{color:#555}.af9{color:#f55}.af10{color:#5f5}.af11{color:#ff5}.af12{color:#55f}.af13{color:#f5f}.af14{color:#5ff}.af15{color:#fff}
    .ab0{background:#000}.ab1{background:#a00}.ab2{background:#0a0}.ab3{background:#a50}.ab4{background:#00a}.ab5{background:#a0a}.ab6{background:#0aa}.ab7{background:#aaa}
    .ab8{background:#555}.ab9{background:#f55}.ab10{background:#5f5}.ab11{background:#ff5}.ab12{background:#55f}.ab13{background:#f5f}.ab14{background:#5ff}.ab15{background:#fff}

    /* --- Top bar --- */
    #bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 3px 4px;
      padding: 6px 10px;
      z-index: 10;
      font-size: 11px;
      background: linear-gradient(var(--bg) 85%, transparent);
      transition: left 0.2s ease;
    }
    #bar .sep { width: 1px; height: 14px; background: var(--ui-border); margin: 0 4px; }
    #bar button {
      background: var(--ui-bg);
      color: var(--ui);
      border: 1px solid var(--ui-border);
      padding: 3px 8px;
      font: 11px 'Courier New', monospace;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #bar button:hover { color: var(--ui-hover); border-color: var(--ui); }
    #bar button.active { color: var(--ui-hover); border-color: var(--ui); }
    #bar select {
      background: var(--ui-bg);
      color: var(--ui);
      border: 1px solid var(--ui-border);
      padding: 3px 4px;
      font: 11px 'Courier New', monospace;
      cursor: pointer;
      max-width: 160px;
    }
    #bar select:hover { color: var(--ui-hover); border-color: var(--ui); }
    #bar .spacer { flex: 1; }
    #bar .info { color: var(--ui-dim); font-size: 10px; margin-left: 8px; }

    /* --- Pack browser panel --- */
    #panel {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 260px;
      background: var(--bg);
      border-right: 1px solid var(--ui-border);
      z-index: 20;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      font-size: 11px;
    }
    #panel.open { transform: translateX(0); }
    #panel-header { padding: 10px 12px; border-bottom: 1px solid var(--ui-border); display: flex; align-items: center; gap: 8px; }
    #panel-header .title { color: var(--accent); font-weight: bold; flex: 1; }
    #panel-header .close { cursor: pointer; color: var(--ui-dim); }
    #panel-header .close:hover { color: var(--ui-hover); }
    #panel-search {
      width: 100%; margin-top: 6px;
      padding: 4px 6px;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      color: var(--fg);
      font: 11px 'Courier New', monospace;
      outline: none;
    }
    #panel-search:focus { border-color: var(--accent); }
    #panel-list { flex: 1; overflow-y: auto; overflow-x: hidden; }
    #panel-list::-webkit-scrollbar { width: 4px; }
    #panel-list::-webkit-scrollbar-thumb { background: var(--ui-border); border-radius: 2px; }
    .pack-year { padding: 6px 12px; color: var(--accent); font-weight: bold; border-bottom: 1px solid var(--ui-border); cursor: pointer; display: flex; justify-content: space-between; }
    .pack-year:hover { background: var(--ui-bg); }
    .pack-year .count { color: var(--ui-dim); font-weight: normal; }
    .pack-group { display: none; }
    .pack-group.open { display: block; }
    .pack-name { padding: 4px 12px 4px 16px; color: var(--ui); cursor: pointer; display: flex; justify-content: space-between; }
    .pack-name:hover { color: var(--ui-hover); background: var(--ui-bg); }
    .pack-name .count { color: var(--ui-dim); }
    .pack-files { display: none; }
    .pack-files.open { display: block; }
    .pack-file { padding: 2px 12px 2px 28px; color: var(--ui-dim); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pack-file:hover { color: var(--ui-hover); background: var(--ui-bg); }
    .pack-file.active { color: var(--accent); }
    .pack-nav { padding: 6px 12px; border-top: 1px solid var(--ui-border); display: flex; gap: 8px; align-items: center; color: var(--ui-dim); }
    .pack-nav button { background: var(--ui-bg); color: var(--ui); border: 1px solid var(--ui-border); padding: 2px 8px; font: 11px 'Courier New', monospace; cursor: pointer; }
    .pack-nav button:hover { color: var(--ui-hover); }
    .pack-nav .pos { flex: 1; text-align: center; }
    #panel-credit { padding: 8px 12px; border-top: 1px solid var(--ui-border); font-size: 9px; color: var(--ui-dim); line-height: 1.4; }
    #panel-credit a { color: var(--accent); text-decoration: none; }
    #panel-credit a:hover { text-decoration: underline; }

    /* --- Bottom --- */
    #bottom { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--ui-dim); z-index: 10; text-align: center; }
    #bottom label, #bottom .browse-link { cursor: pointer; border-bottom: 1px solid var(--ui-border); }
    #bottom label:hover, #bottom .browse-link:hover { color: var(--ui); }
    #file-input { display: none; }

    /* --- Drag overlay --- */
    .drag-over::after {
      content: 'DROP .ANS / .TXT';
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--overlay-bg);
      color: var(--ui);
      font: 20px 'Courier New', monospace;
      letter-spacing: 4px;
      z-index: 100;
    }

    /* --- Toast --- */
    #toast {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: var(--ui-bg); color: var(--ui); border: 1px solid var(--ui-border);
      padding: 6px 14px; font: 11px 'Courier New', monospace;
      z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <!-- Pack browser panel -->
  <div id="panel">
    <div id="panel-header">
      <span class="title">packs</span>
      <input id="panel-search" type="text" placeholder="search...">
      <span class="close" id="panel-close">&times;</span>
    </div>
    <div id="panel-list"></div>
    <div class="pack-nav">
      <button id="nav-prev" title="prev file [&larr;]">&larr;</button>
      <span class="pos" id="nav-pos"></span>
      <button id="nav-next" title="next file [&rarr;]">&rarr;</button>
    </div>
    <div id="panel-credit"></div>
  </div>

  <div id="bar">
    <button id="btn-browse" title="[b] browse packs">packs</button>
    <div class="sep"></div>
    <!-- Effect buttons are injected here by main.js from the effects registry -->
    <div class="sep"></div>
    <button id="btn-reset" title="[r] reset positions">reset</button>
    <div class="sep"></div>
    <button id="btn-color" title="[c]">color</button>
    <button id="btn-invert" title="[i]">invert</button>
    <button id="btn-select" title="[s] toggle text select">select</button>
    <div class="sep"></div>
    <span id="font-slot"></span>
    <div class="sep"></div>
    <span id="param-label" class="info" style="min-width:50px;text-align:right;"></span>
    <input id="param-slider" type="range" min="0" max="100" value="50" style="width:80px;accent-color:var(--ui);vertical-align:middle;">
    <span id="param-value" class="info" style="min-width:24px;">50</span>
    <span id="param2-label" class="info" style="min-width:50px;text-align:right;"></span>
    <input id="param2-slider" type="range" min="0" max="100" value="50" style="width:80px;accent-color:var(--ui);vertical-align:middle;">
    <span id="param2-value" class="info" style="min-width:24px;">50</span>
    <span id="param3-label" class="info" style="min-width:50px;text-align:right;"></span>
    <input id="param3-slider" type="range" min="0" max="100" value="50" style="width:80px;accent-color:var(--ui);vertical-align:middle;">
    <span id="param3-value" class="info" style="min-width:24px;">50</span>
    <span id="param4-label" class="info" style="min-width:50px;text-align:right;"></span>
    <input id="param4-slider" type="range" min="0" max="100" value="50" style="width:80px;accent-color:var(--ui);vertical-align:middle;">
    <span id="param4-value" class="info" style="min-width:24px;">50</span>
    <div class="spacer"></div>
    <span id="info" class="info"></span>
  </div>

  <div id="art-scroll">
    <div id="art-scroll-inner">
      <div id="art"></div>
    </div>
  </div>

  <div id="bottom">
    <span class="browse-link" id="bottom-browse">browse packs</span>
    <span> · </span>
    <label for="file-input">load file</label>
    <input id="file-input" type="file" accept=".ans,.txt,.asc,.nfo,.diz,.ice">
    <span id="filename"></span>
  </div>

  <div id="toast"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
